name: Build Linux Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/cokacdir cokacdir-linux-x86_64
          chmod +x cokacdir-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cokacdir-linux-x86_64
          path: cokacdir-linux-x86_64
          retention-days: 30

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: cokacdir-linux-x86_64
          body: |
            자동 빌드 - ${{ github.sha }}
